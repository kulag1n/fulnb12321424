name: MAX Hourly Sender

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send message to MAX (wire format)
        run: |
          CID=$(date +%s%3N)
          curl -s -X POST "https://platform-api.max.ru/messages" \
            -H "Authorization: ${{ secrets.MAX_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"chatId\": ${{ secrets.MAX_CHAT_ID }}, \"message\": {\"cid\": ${CID}, \"text\": \"Автосообщение от GitHub Actions\"}}"

